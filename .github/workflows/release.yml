name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Configure native Morphly camera build
      shell: pwsh
      run: cmake -S native-camera -B native-camera/build -A x64

    - name: Build native Morphly camera artifacts
      shell: pwsh
      run: cmake --build native-camera/build --config Release

    - name: Install dependencies
      working-directory: app
      run: npm ci

    - name: Build Electron app
      working-directory: app
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MORPHLY_NATIVE_BUILD_DIR: ../native-camera/build
      run: npm run electron:release

    - name: Resolve release version
      id: release-version
      working-directory: app
      shell: pwsh
      run: |
        $packageVersion = (Get-Content package.json | ConvertFrom-Json).version

        if ("${{ github.ref_type }}" -eq "tag") {
          $tagName = "${{ github.ref_name }}"
          $tagVersion = $tagName.TrimStart('v')

          if ($tagVersion -ne $packageVersion) {
            throw "Tag $tagName does not match app/package.json version $packageVersion. Update the app version before creating the tag."
          }

          $version = $tagVersion
        } else {
          $version = $packageVersion
          $tagName = "v$packageVersion"
        }

        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT

    - name: Verify release artifacts
      shell: pwsh
      run: |
        $version = "${{ steps.release-version.outputs.VERSION }}"
        $dir = "app/release"

        if (!(Test-Path $dir)) { throw "Missing output directory: $dir" }

        $blockmaps = Get-ChildItem -Path $dir -Filter "*.blockmap" -ErrorAction SilentlyContinue
        if (!$blockmaps) { throw "Missing .blockmap files in $dir" }

        $installerCandidates = @(
          (Join-Path $dir "Morphly-Setup-$version.exe"),
          (Join-Path $dir "Morphly Setup $version.exe")
        )
        $portableCandidates = @(
          (Join-Path $dir "Morphly-$version.exe"),
          (Join-Path $dir "Morphly $version.exe")
        )

        $exe1 = $installerCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
        $exe2 = $portableCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

        if (!$exe1) { throw "Missing installer. Checked: $($installerCandidates -join ', ')" }
        if (!$exe2) { throw "Missing portable build. Checked: $($portableCandidates -join ', ')" }

        $bundledCameraDir = Join-Path $dir "win-unpacked/resources/morphly-cam"
        if (!(Test-Path $bundledCameraDir)) { throw "Missing bundled camera directory: $bundledCameraDir" }

        $expectedArtifacts = @(
          "MorphlyVirtualCamera.dll",
          "morphly_cam_registrar.exe",
          "morphly_cam_pipe_publisher.exe"
        )

        foreach ($artifact in $expectedArtifacts) {
          $artifactPath = Join-Path $bundledCameraDir $artifact
          if (!(Test-Path $artifactPath)) { throw "Missing bundled camera artifact: $artifactPath" }
        }
