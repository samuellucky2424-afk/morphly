name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      working-directory: app
      run: npm ci

    - name: Build Electron app
      working-directory: app
      run: npm run electron:build

    - name: Resolve release version
      id: release-version
      working-directory: app
      shell: pwsh
      run: |
        $packageVersion = (Get-Content package.json | ConvertFrom-Json).version

        if ("${{ github.ref_type }}" -eq "tag") {
          $tagName = "${{ github.ref_name }}"
          $tagVersion = $tagName.TrimStart('v')

          if ($tagVersion -ne $packageVersion) {
            throw "Tag $tagName does not match app/package.json version $packageVersion. Update the app version before creating the tag."
          }

          $version = $tagVersion
        } else {
          $version = $packageVersion
          $tagName = "v$packageVersion"
        }

        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG_NAME=$tagName" >> $env:GITHUB_OUTPUT

    - name: Create or update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release-version.outputs.TAG_NAME }}
        name: Release ${{ steps.release-version.outputs.TAG_NAME }}
        target_commitish: ${{ github.sha }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        files: |
          app/release/Morphly Desktop Setup ${{ steps.release-version.outputs.VERSION }}.exe
          app/release/Morphly Desktop ${{ steps.release-version.outputs.VERSION }}.exe
